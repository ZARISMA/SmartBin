# docker-compose.edge.yml — Lightweight edge (report to server)
# Runs on a Linux host with cameras on USB. No web UI. POSTs results and
# heartbeats to the central server, and exposes a sidecar HTTP server so
# the admin dashboard can proxy the live stream and send control commands.
#
# Usage:
#   HEXABIN_SERVER_URL=http://<server-ip>:8000 \
#   docker compose -f docker-compose.edge.yml up -d
#
# Pipeline is selected via HEXABIN_CAMERA_MODE (oak | oak-native).
# Strategy (manual / auto) only applies to the dual-OAK pipeline and can be
# changed at runtime from the admin dashboard without a restart.

services:
  edge:
    build:
      context: .
      dockerfile: Dockerfile.edge
    env_file:
      - path: .env
        required: false
    environment:
      - HEXABIN_EDGE_MODE=true
      - HEXABIN_SERVER_URL=${HEXABIN_SERVER_URL:-http://192.168.1.100:8000}
      # Must match the server's HEXABIN_EDGE_API_KEY. This key is scoped to
      # the ingest endpoints only — it does not open the admin dashboard.
      - HEXABIN_EDGE_API_KEY=${HEXABIN_EDGE_API_KEY:-edge-key-change-me}
      # "server": send frames to the central server, which runs the LLM and
      # replies with the bin-module command. "local": classify on-device with
      # Gemini (the original behavior; needs GEMINI_API_KEY on the Pi).
      - HEXABIN_CLASSIFY_MODE=${HEXABIN_CLASSIFY_MODE:-server}
      - HEXABIN_BIN_ID=${HEXABIN_BIN_ID:-bin-01}
      - HEXABIN_CAMERA_MODE=${HEXABIN_CAMERA_MODE:-oak-native}
      - HEXABIN_STRATEGY=${HEXABIN_STRATEGY:-manual}
      - HEXABIN_LOCATION=${HEXABIN_LOCATION:-Yerevan}
      # LAN IP the laptop uses to reach this Pi (container IP is not routable).
      # Required so the server-side proxy routes (/api/bin/{id}/stream) work.
      - HEXABIN_EDGE_HOST=${HEXABIN_EDGE_HOST:-}
    privileged: true
    ports:
      - "${HEXABIN_EDGE_PORT:-8000}:8000"
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - edge_images:/app/waste_dataset
    restart: unless-stopped
    command: ["python", "-m", "hexabin.control"]

volumes:
  edge_images:
