# docker-compose.yml — Server mode (LAN dashboard)
# Run on a laptop/server. No cameras needed.
# Accessible from any device on the same network at http://<server-ip>:8000
#
# Usage:  docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartwaste
      POSTGRES_USER: smartwaste
      POSTGRES_PASSWORD: ${HEXABIN_DB_PASSWORD:-smartwaste}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartwaste"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - HEXABIN_DB_BACKEND=postgresql
      - HEXABIN_DB_HOST=postgres
      - HEXABIN_CAMERA_MODE=none
      # LLM backend: gemini (default) | lmstudio | cascade.
      # For a separate LLM-host machine, point HEXABIN_LMSTUDIO_URL at it,
      # e.g. http://<llm-host-ip>:1234/v1 (see docker-compose.server-llm.yml
      # for running server + LM Studio on the same machine).
      - HEXABIN_LLM_BACKEND=${HEXABIN_LLM_BACKEND:-gemini}
      - HEXABIN_LMSTUDIO_URL=${HEXABIN_LMSTUDIO_URL:-http://localhost:1234/v1}
      - HEXABIN_LMSTUDIO_MODEL=${HEXABIN_LMSTUDIO_MODEL:-google/gemma-4-12b-qat}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - waste_images:/app/waste_dataset
      - ./hexabin:/app/hexabin
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  waste_images:
  grafana_data:
