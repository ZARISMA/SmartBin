services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartwaste
      POSTGRES_USER: smartwaste
      POSTGRES_PASSWORD: ${SMARTWASTE_DB_PASSWORD:-smartwaste}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartwaste"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SMARTWASTE_DB_BACKEND=postgresql
      - SMARTWASTE_DB_HOST=postgres
      - SMARTWASTE_DB_PORT=5432
      - SMARTWASTE_DB_NAME=smartwaste
      - SMARTWASTE_DB_USER=smartwaste
      - SMARTWASTE_DB_PASSWORD=${SMARTWASTE_DB_PASSWORD:-smartwaste}
      - SMARTWASTE_LOCATION=${SMARTWASTE_LOCATION:-Yerevan}
      - SMARTWASTE_MODEL_NAME=${SMARTWASTE_MODEL_NAME:-gemini-3-flash-preview}
      - SMARTWASTE_CAMERA_MODE=${SMARTWASTE_CAMERA_MODE:-oak}
    ports:
      - "8000:8000"
    privileged: true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - waste_images:/app/waste_dataset

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  waste_images:
  grafana_data:
