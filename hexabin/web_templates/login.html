<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>Sign in · HexaBin</title>
    <script>
        (function(){try{var t=localStorage.getItem('hexabin-theme');if(t!=='light'&&t!=='dark'){t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.dataset.theme=t;}catch(e){document.documentElement.dataset.theme='light';}})();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Chakra+Petch:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/brand.css">
    <style>
        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            background:
                radial-gradient(circle at 30% 20%, rgba(189, 183, 107, 0.20) 0%, transparent 55%),
                radial-gradient(circle at 75% 80%, rgba(45, 90, 66, 0.18) 0%, transparent 60%),
                var(--sb-bg);
        }
        .login-theme {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .login-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .login-brand .logo {
            width: 36px; height: 36px;
            color: var(--sb-forest);
        }
        .login-brand .logo svg { width: 100%; height: 100%; }
        .login-brand .name {
            font-family: var(--sb-font-display);
            font-size: 38px;
            color: var(--sb-text);
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .login-card {
            background: var(--sb-surface);
            border-radius: 18px;
            padding: 36px 36px 32px;
            box-shadow: var(--sb-shadow-float), 0 0 0 1px var(--sb-border);
        }
        .login-card .kicker {
            font-size: 11px;
            font-weight: 700;
            color: var(--sb-accent-ink);
            letter-spacing: 0.16em;
            text-transform: uppercase;
            text-align: center;
        }
        .login-card h1 {
            text-align: center;
            font-family: var(--sb-font-display);
            font-size: 32px;
            font-weight: 400;
            color: var(--sb-text);
            letter-spacing: -0.02em;
            margin: 8px 0 6px;
        }
        .login-card .subtitle {
            text-align: center;
            color: var(--sb-text-muted);
            font-size: 14px;
            margin: 0 0 28px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--sb-text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--sb-border-strong);
            border-radius: 10px;
            background: var(--sb-surface-2);
            color: var(--sb-text);
            font-size: 15px;
            font-family: var(--sb-font-ui);
            outline: none;
            box-sizing: border-box;
            transition: border-color 120ms ease, background 120ms ease;
        }
        .form-group input:focus {
            border-color: var(--sb-forest);
            background: var(--sb-surface);
            box-shadow: 0 0 0 3px rgba(45, 90, 66, 0.12);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            background: var(--sb-forest);
            color: var(--sb-white);
            font-size: 15px;
            font-weight: 600;
            font-family: var(--sb-font-ui);
            cursor: pointer;
            transition: background 120ms ease;
        }
        .login-btn:hover { background: #244836; }
        .error-msg {
            background: rgba(198, 40, 40, 0.08);
            border: 1px solid rgba(198, 40, 40, 0.30);
            color: var(--sb-error);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }
        .site-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            color: var(--sb-text-muted);
            font-size: 12px;
        }
        .site-link a {
            color: var(--sb-accent-ink);
            text-decoration: none;
            font-weight: 600;
        }
        .site-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <button type="button" class="sb-theme-toggle login-theme" data-theme-toggle aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="sb-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="sb-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
    <div class="login-wrap">
        <div class="login-brand">
            <span class="logo" aria-hidden="true">
                <svg viewBox="0 0 195 218" fill="none">
                    <defs>
                        <mask id="hx-login" maskUnits="userSpaceOnUse" x="0" y="0" width="195" height="218">
                            <rect x="0" y="0" width="195" height="218" fill="white"></rect>
                            <rect x="85.6" y="-8" width="20" height="42" fill="black"></rect>
                            <rect x="-9.2" y="140.7" width="45" height="19.2" fill="black" transform="rotate(-30 13.3 150.3)"></rect>
                        </mask>
                    </defs>
                    <path d="M 93 10.37 A 7 7 0 0 1 100 10.37 L 178 55.4 A 7 7 0 0 1 181.5 61.47 L 181.5 151.53 A 7 7 0 0 1 178 157.6 L 100 202.63 A 7 7 0 0 1 93 202.63 L 15 157.6 A 7 7 0 0 1 11.5 151.53 L 11.5 61.47 A 7 7 0 0 1 15 55.4 Z" fill="none" stroke="currentColor" stroke-width="11" mask="url(#hx-login)"></path>
                </svg>
            </span>
            <span class="name">HexaBin</span>
        </div>

        <div class="login-card">
            <div class="kicker">Control Center</div>
            <h1>Sign in</h1>
            <p class="subtitle">Access the operator dashboard.</p>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn">Sign in</button>
            </form>

            <div class="site-link">
                <a href="/site">View HexaBin presentation →</a>
            </div>
        </div>
    </div>
    <script src="/static/theme.js" defer></script>
</body>
</html>
