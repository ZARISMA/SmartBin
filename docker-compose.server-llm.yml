# docker-compose.server-llm.yml — Server + LLM host on the same machine
# Same server stack as docker-compose.yml, pre-wired to an LM Studio server
# running on the Docker HOST (LM Studio is a host application, not a container):
#
#   1. In LM Studio, load the model (default: google/gemma-4-12b-qat) and
#      start the server:  `lms server start`  or  Developer → Start Server.
#      Verify:  curl http://localhost:1234/v1/models
#   2. docker compose -f docker-compose.server-llm.yml up -d
#
# The app reaches LM Studio via host.docker.internal (native on Docker Desktop
# for Windows/macOS; the extra_hosts entry makes it work on Linux too).
#
# Default backend is "cascade": LM Studio classifies first; results with
# confidence below SMARTWASTE_CONFIDENCE_THRESHOLD (70%) — or LM Studio
# failures — escalate to Gemini (set GEMINI_API_KEY in .env for that).
#
# SECURITY: LM Studio's server has no authentication — keep port 1234 on a
# trusted LAN / behind a firewall, never exposed to the internet.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartwaste
      POSTGRES_USER: smartwaste
      POSTGRES_PASSWORD: ${SMARTWASTE_DB_PASSWORD:-smartwaste}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartwaste"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - SMARTWASTE_DB_BACKEND=postgresql
      - SMARTWASTE_DB_HOST=postgres
      - SMARTWASTE_CAMERA_MODE=none
      - SMARTWASTE_LLM_BACKEND=${SMARTWASTE_LLM_BACKEND:-cascade}
      - SMARTWASTE_LMSTUDIO_URL=${SMARTWASTE_LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      - SMARTWASTE_LMSTUDIO_MODEL=${SMARTWASTE_LMSTUDIO_MODEL:-google/gemma-4-12b-qat}
      - SMARTWASTE_CONFIDENCE_THRESHOLD=${SMARTWASTE_CONFIDENCE_THRESHOLD:-0.70}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - waste_images:/app/waste_dataset
      - ./smartwaste:/app/smartwaste
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  waste_images:
  grafana_data:
