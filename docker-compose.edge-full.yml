# docker-compose.edge-full.yml — Full stack on Raspberry Pi
# Runs camera + web UI + DB + Grafana on the Pi itself.
# View on Pi via http://localhost:8000 or from LAN via http://<pi-ip>:8000
#
# Usage:  docker compose -f docker-compose.edge-full.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartwaste
      POSTGRES_USER: smartwaste
      POSTGRES_PASSWORD: ${SMARTWASTE_DB_PASSWORD:-smartwaste}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartwaste"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - SMARTWASTE_DB_BACKEND=postgresql
      - SMARTWASTE_DB_HOST=postgres
      - SMARTWASTE_CAMERA_MODE=${SMARTWASTE_CAMERA_MODE:-oak-native}
      - SMARTWASTE_BIN_ID=${SMARTWASTE_BIN_ID:-bin-01}
      - SMARTWASTE_LOCATION=${SMARTWASTE_LOCATION:-Yerevan}
    ports:
      - "8000:8000"
    privileged: true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - waste_images:/app/waste_dataset
      - ./smartwaste:/app/smartwaste

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  waste_images:
  grafana_data:
